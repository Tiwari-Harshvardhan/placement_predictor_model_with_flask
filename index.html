<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Predictor</title>
</head>
<body>
    <h1>Placement Predictor</h1>

    <form id="predict-form">
        <label for="cgpa">CGPA:</label>
        <input id="cgpa" name="cgpa" type="number" step="0.01" min="0" max="10" required /><br /><br />

        <label for="iq">IQ:</label>
        <input id="iq" name="iq" type="number" min="0" max="200" required /><br /><br />

        <button type="submit">Predict</button>
    </form>

    <h2 id="result"></h2>

    <script>
    document.getElementById('predict-form').addEventListener('submit', async (event) => {
        event.preventDefault();

        const cgpa = parseFloat(document.getElementById('cgpa').value);
        const iq = parseInt(document.getElementById('iq').value, 10);

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cgpa, iq }),
            });

            if (!res.ok) {
                throw new Error(`API error ${res.status}`);
            }

            const data = await res.json();
            document.getElementById('result').textContent = data.placement === 1 ? 'Placed' : 'Not Placed';
        } catch (err) {
            document.getElementById('result').textContent = `Error: ${err.message}`;
        }
    });
    </script>
</body>
</html>
